<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistem ATS</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color:#f4f4f9;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .login-box{
            background:white;
            padding:30px;
            border-radius:8px;
            box-shadow:0 4px 8px rgba(0,0,0,0.1);
            width:300px;
        }

        h2{
            text-align:center;
            margin-top:0;
        }

        label{
            display:block;
            margin-top:10px;
        }

        input[type="text"],
        input[type="password"]{
            width:100%;
            padding:10px;
            margin:10px 0;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:10px;
            background:#28a745;
            color:white;
            border:none;
            border-radius:5px;
            font-weight:bold;
            cursor:pointer;
        }

        button:hover{
            background:#218838;
        }

        .error{
            color:red;
            font-size:14px;
            text-align:center;
            display:none;
            margin-bottom:10px;
        }

        .back{
            text-align:center;
            font-size:12px;
            margin-top:15px;
        }
    </style>

</head>

<body>

<div class="login-box">

    <h2>Silakan Login</h2>

    <p id="error" class="error"></p>

    <form id="loginForm">

        <label>Username:</label>

        <input
            type="text"
            id="username"
            name="username"
            required>

        <label>Password:</label>

        <input
            type="password"
            id="password"
            name="password"
            required>

        <button type="submit">
            Login
        </button>

    </form>

    <p class="back">
        <a href="index.html">
            ← Kembali ke Utama
        </a>
    </p>

</div>

<script src="js/login.js"></script>

</body>
</html>
